<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataConnext - The Architect of Intelligent Business</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    },
                    colors: {
                        yellow: {
                            400: '#FACC15',
                            500: '#EAB308',
                            600: '#CA8A04',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-out forwards',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Styles for Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #18181b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #444; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #eab308; 
        }
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-white text-gray-900 selection:bg-yellow-500 selection:text-black antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons (SVG Components to replace Lucide imports) ---
        const Icon = ({ path, className, size = 24, ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                width={size}
                height={size}
                className={className} 
                {...props}
            >
                {path}
            </svg>
        );

        const MenuIcon = (props) => <Icon path={<><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></>} {...props} />;
        const XIcon = (props) => <Icon path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} {...props} />;
        const ArrowRight = (props) => <Icon path={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} {...props} />;
        const CheckCircle = (props) => <Icon path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} {...props} />;
        const XCircle = (props) => <Icon path={<><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>} {...props} />;
        const BarChart3 = (props) => <Icon path={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} {...props} />;
        const Users = (props) => <Icon path={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} {...props} />;
        const Phone = (props) => <Icon path={<><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></>} {...props} />;
        const Play = (props) => <Icon path={<polygon points="5 3 19 12 5 21 5 3"/>} fill="currentColor" {...props} />;
        const ChevronRight = (props) => <Icon path={<polyline points="9 18 15 12 9 6"/>} {...props} />;
        const Star = (props) => <Icon path={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>} {...props} />;
        const CodeIcon = (props) => <Icon path={<><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></>} {...props} />;
        const LineChart = (props) => <Icon path={<><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></>} {...props} />;

        // --- Data ---
        const painPoints = [
            { text: "ซื้อโปรแกรมสำเร็จรูปแพง แต่ฟีเจอร์ไม่ตอบโจทย์", icon: <XCircle className="w-8 h-8 text-red-500" />, sub: "เสียเงินเปล่า ใช้งานจริงไม่ได้" },
            { text: "พนักงานบ่นว่าใช้ยาก จนต้องกลับไปจดกระดาษ", icon: <Users className="w-8 h-8 text-red-500" />, sub: "Workflow สะดุด งานไม่เดิน" },
            { text: "อยากดูยอดขาย Real-time แต่ทำไม่ได้", icon: <LineChart className="w-8 h-8 text-red-500" />, sub: "ตัดสินใจช้า คู่แข่งแซงหน้า" },
            { text: "ติดต่อ Support ยาก รอคิวนาน ธุรกิจสะดุด", icon: <Phone className="w-8 h-8 text-red-500" />, sub: "ไม่มีคนดูแลเมื่อเกิดปัญหา" }
        ];

        const solutions = [
            { title: "Custom Software", desc: "เขียนใหม่เพื่อธุรกิจคุณ 100% ไม่ต้องปรับตัวเข้าหาโปรแกรม ให้โปรแกรมปรับเข้าหาคุณ", icon: <CodeIcon className="w-8 h-8 text-black" />, image: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?q=80&w=800&auto=format&fit=crop" },
            { title: "Business Intelligence", desc: "แถมฟรี! ระบบวิเคราะห์กำไร เปลี่ยนตัวเลขรกๆ ให้เป็นกราฟที่อ่านง่าย ตัดสินใจได้ทันที", icon: <BarChart3 className="w-8 h-8 text-black" />, image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800&auto=format&fit=crop" },
            { title: "AI Agent Setup", desc: "เปลี่ยนงานที่น่าเบื่อให้ AI ช่วยทำ ลดภาระพนักงาน ยกระดับประสิทธิภาพการทำงาน", icon: <Users className="w-8 h-8 text-black" />, image: "https://images.unsplash.com/photo-1600880292203-757bb62b4baf?q=80&w=800&auto=format&fit=crop" }
        ];

        // --- Components ---

        const LogoPlaceholder = () => (
            <div className="flex items-center gap-2 select-none cursor-pointer">
                <img src="logo.png" alt="DataConnext Logo" className="w-10 h-10 object-contain" />
                <span className="text-2xl font-bold tracking-tight text-white uppercase italic">DataConnext</span>
            </div>
        );

        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/80 backdrop-blur-md py-3 border-b border-white/10' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <LogoPlaceholder />

                        {/* Desktop Menu */}
                        <div className="hidden md:flex items-center gap-10">
                            {['Solutions', 'Pricing', 'Contact'].map((item) => (
                                <a 
                                    key={item} 
                                    href={`#${item.toLowerCase()}`}
                                    className="text-white/80 hover:text-yellow-500 font-medium transition-colors text-sm tracking-wide"
                                >
                                    {item}
                                </a>
                            ))}
                            <a href="tel:0994405888" className="px-6 py-2.5 bg-yellow-500 text-black font-bold rounded-lg hover:bg-yellow-400 transition-all shadow-lg hover:shadow-yellow-500/20 active:scale-95">
                                Call Us Now
                            </a>
                        </div>

                        {/* Mobile Toggle */}
                        <button className="md:hidden text-white" onClick={() => setIsOpen(!isOpen)}>
                            {isOpen ? <XIcon size={28} /> : <MenuIcon size={28} />}
                        </button>
                    </div>

                    {/* Mobile Menu Overlay */}
                    <div className={`fixed inset-0 bg-black/95 z-50 transition-all duration-500 md:hidden ${isOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                        <div className="flex flex-col items-center justify-center h-full gap-8">
                            <button className="absolute top-8 right-8 text-white" onClick={() => setIsOpen(false)}>
                                <XIcon size={32} />
                            </button>
                            {['Solutions', 'Pricing', 'Contact'].map((item) => (
                                <a 
                                    key={item} 
                                    href={`#${item.toLowerCase()}`}
                                    className="text-white text-3xl font-bold hover:text-yellow-500 transition-colors"
                                    onClick={() => setIsOpen(false)}
                                >
                                    {item}
                                </a>
                            ))}
                            <a 
                                href="tel:0994405888" 
                                className="mt-4 px-10 py-4 bg-yellow-500 text-black font-bold text-xl rounded-xl"
                                onClick={() => setIsOpen(false)}
                            >
                                Call Us Now
                            </a>
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section className="relative min-h-[90vh] flex items-center overflow-hidden bg-black">
                    <div className="absolute inset-0">
                        <div className="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black z-10"></div>
                        <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000&auto=format&fit=crop" className="w-full h-full object-cover opacity-60" alt="Background" />
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_30%_30%,_rgba(234,179,8,0.15),transparent_50%)] z-20"></div>
                    </div>
                    
                    <div className="container mx-auto px-6 relative z-10 grid lg:grid-cols-2 gap-16 items-center pt-24 md:pt-32 pb-16">
                        <div className="opacity-0 animate-slide-up text-center lg:text-left">
                            <div className="inline-flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-full mb-8 backdrop-blur-sm">
                                <div className="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
                                <span className="text-yellow-500 font-medium text-xs sm:text-sm tracking-wide uppercase">Intelligent Business Solutions</span>
                            </div>
                            <h1 className="text-4xl sm:text-5xl lg:text-7xl font-bold text-white leading-[1.1] mb-8">
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600">The Architect of</span> <br />
                                Intelligent Business
                            </h1>
                            <p className="text-gray-400 text-base md:text-xl mb-10 leading-relaxed font-light max-w-lg mx-auto lg:mx-0">
                                บริการสร้างซอฟต์แวร์ส่วนตัว (Custom Software) พร้อมระบบวิเคราะห์กำไร (BI) มาตรฐานที่ปรึกษา ดูแลธุรกิจคุณเหมือนพาร์ทเนอร์คนสำคัญ
                            </p>
                            <div className="flex flex-col sm:flex-row gap-5 justify-center lg:justify-start">
                                <a href="tel:0994405888" className="px-8 py-4 bg-yellow-500 text-black font-bold text-lg rounded-xl hover:bg-yellow-400 transition-all shadow-[0_0_30px_rgba(234,179,8,0.3)] hover:scale-105 text-center flex items-center justify-center">ขอคำปรึกษาฟรี</a>
                                <button className="px-8 py-4 bg-white/5 border border-white/10 text-white font-medium text-lg rounded-xl hover:bg-white/10 transition-all flex items-center justify-center gap-2 backdrop-blur-sm">
                                    ดูตัวอย่างระบบ <ArrowRight size={20} />
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const PainPoints = () => {
            return (
                <section className="py-24 bg-white relative">
                    <div className="container mx-auto px-6">
                        <div className="text-center mb-16 md:mb-20">
                            <span className="text-yellow-600 font-bold tracking-widest uppercase text-xs mb-3 block">Problem</span>
                            <h2 className="text-3xl md:text-4xl font-bold text-gray-900 mb-6 px-4">ธุรกิจคุณกำลังติดหล่ม <br/>ด้วยปัญหาเหล่านี้หรือไม่?</h2>
                            <div className="w-24 h-1.5 bg-yellow-500 mx-auto rounded-full"></div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
                            {painPoints.map((point, index) => (
                                <div key={index} className="p-8 bg-gray-50 rounded-3xl border border-gray-100 shadow-sm hover:shadow-xl hover:border-red-100 transition-all group hover:-translate-y-2 duration-300">
                                    <div className="mb-6 bg-white w-16 h-16 rounded-2xl flex items-center justify-center shadow-md group-hover:scale-110 transition-transform">
                                        {point.icon}
                                    </div>
                                    <h3 className="text-lg font-bold text-gray-900 mb-3">{point.text}</h3>
                                    <p className="text-gray-500 text-sm leading-relaxed">{point.sub}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Solutions = () => {
            return (
                <section id="solutions" className="py-24 bg-zinc-50">
                    <div className="container mx-auto px-6">
                        <div className="flex flex-col md:flex-row justify-between items-center md:items-end mb-16 text-center md:text-left">
                            <div className="mb-6 md:mb-0">
                                <span className="text-yellow-600 font-bold tracking-widest uppercase text-xs mb-2 block">Our Solution</span>
                                <h2 className="text-3xl md:text-5xl font-bold text-gray-900">
                                    ปลดล็อกศักยภาพธุรกิจ <br/>ด้วย <span className="text-yellow-500 relative inline-block">
                                        Custom Solution
                                        <svg className="absolute w-full h-3 -bottom-1 left-0 text-yellow-500/30" viewBox="0 0 100 10" preserveAspectRatio="none">
                                            <path d="M0 5 Q 50 10 100 5" stroke="currentColor" strokeWidth="8" fill="none" />
                                        </svg>
                                    </span>
                                </h2>
                            </div>
                            <p className="md:w-1/3 text-gray-600 px-4 md:px-0">เราไม่ได้แค่ขายโปรแกรม แต่เราออกแบบระบบการทำงานใหม่ เพื่อให้ธุรกิจของคุณรันได้แบบอัตโนมัติและมีประสิทธิภาพสูงสุด</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {solutions.map((sol, idx) => (
                                <div key={idx} className="group relative bg-white rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-500 min-h-[400px] md:h-[500px]">
                                    <div className="absolute inset-0">
                                        <img src={sol.image} alt={sol.title} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent opacity-90 group-hover:opacity-80 transition-opacity"></div>
                                    </div>
                                    <div className="absolute inset-0 p-8 md:p-10 flex flex-col justify-end">
                                        <div className="w-14 h-14 bg-yellow-500 rounded-2xl flex items-center justify-center mb-6 text-black shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                                            {sol.icon}
                                        </div>
                                        <h3 className="text-xl md:text-2xl font-bold text-white mb-4 transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500 delay-75">{sol.title}</h3>
                                        <p className="text-gray-300 text-sm md:text-base leading-relaxed transform translate-y-8 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-500 delay-100">{sol.desc}</p>
                                        <div className="w-full h-1 bg-yellow-500 mt-8 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-left"></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Comparison = () => {
            const comparisonData = [
                { feature: "Cost / Month", programmer: "30k - 50k++", software: "ก้อนใหญ่ + รายปี", dataconnext: "Start 20,000 THB", highlight: true },
                { feature: "Flexibility", programmer: "เสี่ยงลาออกทิ้งงาน", software: "ปรับแก้ไม่ได้", dataconnext: "ปรับแก้ได้ตลอดสัญญา", icon: <CheckCircle size={20} className="text-yellow-600" /> },
                { feature: "Expertise", programmer: "1 คน (วัดดวง)", software: "Support (รอคิวนาน)", dataconnext: "Expert Team", icon: <Users size={20} className="text-yellow-600" /> }
            ];

            return (
                <section id="pricing" className="py-24 bg-white">
                    <div className="container mx-auto px-6">
                        <h2 className="text-3xl md:text-4xl font-bold text-center mb-16 px-4">
                            ทำไมบริการนี้ถึง <span className="text-yellow-500 underline decoration-8 decoration-yellow-500/20 underline-offset-4">คุ้มค่าที่สุด</span>
                        </h2>
                        
                        {/* Desktop Table View */}
                        <div className="hidden md:block overflow-hidden rounded-3xl border border-gray-200 shadow-xl bg-white">
                            <table className="w-full border-collapse">
                                <thead>
                                    <tr className="bg-gray-50 border-b border-gray-200">
                                        <th className="p-6 text-left text-gray-500 font-medium w-1/4">Comparison</th>
                                        <th className="p-6 text-center text-gray-500 font-medium w-1/4">จ้างโปรแกรมเมอร์ประจำ</th>
                                        <th className="p-6 text-center text-gray-500 font-medium w-1/4">ซื้อโปรแกรมสำเร็จรูป</th>
                                        <th className="p-6 text-center bg-zinc-900 text-yellow-500 font-bold w-1/4 relative">
                                            <div className="absolute top-0 right-0 p-1 bg-yellow-500 text-black text-[10px] font-bold px-2 rounded-bl-lg">RECOMMENDED</div>
                                            DataConnext
                                        </th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {comparisonData.map((row, i) => (
                                        <tr key={i}>
                                            <td className="p-6 font-semibold text-gray-700">{row.feature}</td>
                                            <td className="p-6 text-center text-gray-500 text-sm">{row.programmer}</td>
                                            <td className="p-6 text-center text-gray-500 text-sm">{row.software}</td>
                                            <td className={`p-6 text-center bg-yellow-50/30 font-bold ${row.highlight ? 'text-green-600 text-xl' : 'text-gray-800 font-medium'}`}>
                                                <span className="flex items-center justify-center gap-2">
                                                    {row.icon} {row.dataconnext}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {/* Mobile Cards View */}
                        <div className="md:hidden space-y-6">
                            {comparisonData.map((row, i) => (
                                <div key={i} className="bg-gray-50 rounded-2xl p-6 border border-gray-100">
                                    <h3 className="font-bold text-lg mb-4 text-gray-900 border-b border-gray-200 pb-2">{row.feature}</h3>
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center text-sm">
                                            <span className="text-gray-500 font-medium">จ้างโปรแกรมเมอร์</span>
                                            <span className="text-gray-900">{row.programmer}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-sm">
                                            <span className="text-gray-500 font-medium">โปรแกรมสำเร็จรูป</span>
                                            <span className="text-gray-900">{row.software}</span>
                                        </div>
                                        <div className="bg-yellow-500/10 p-3 rounded-xl border border-yellow-500/20 flex justify-between items-center">
                                            <span className="text-yellow-700 font-bold">DataConnext</span>
                                            <span className={`flex items-center gap-1 ${row.highlight ? 'text-green-600 font-bold text-lg' : 'text-gray-900 font-bold'}`}>
                                                {row.icon && React.cloneElement(row.icon, { size: 16 })} {row.dataconnext}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Pricing = () => {
            return (
                <section className="py-24 bg-zinc-50">
                    <div className="container mx-auto px-6 max-w-5xl">
